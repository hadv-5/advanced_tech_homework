<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
</head>

  
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="container bg-white p-4 shadow-sm rounded-3" style="max-width: 600px;">
    
    <div class="row text-center mb-5 justify-content-center">
        <div class="col">
            <input type="number" id="num1" class="form-control mb-2 text-center" placeholder="0">
            <label class="form-label">number 1</label>
        </div>
        <div class="col">
            <input type="number" id="num2" class="form-control mb-2 text-center" placeholder="0">
            <label class="form-label">number 2</label>
        </div>
        <div class="col">
            <input type="number" id="num3" class="form-control mb-2 text-center" placeholder="0">
            <label class="form-label">number 3</label>
        </div>
    </div>

    
    <div class="row justify-content-center">
        <div class="col-12 text-center">
            
            <div class="d-flex align-items-center justify-content-center mb-3">
                <button class="btn btn-outline-secondary w-25" onclick="calculate('add')">ADD</button>
                <span class="px-3">=</span>
                <span class="fw-bold text-warning" id="resAdd">الجمع</span>
            </div>

            <div class="d-flex align-items-center justify-content-center mb-3">
                <button class="btn btn-outline-secondary w-25" onclick="calculate('multi')">Multi</button>
                <span class="px-3">=</span>
                <span class="fw-bold text-warning" id="resMulti">الضرب</span>
            </div>

            <div class="d-flex align-items-center justify-content-center mb-3">
                <button class="btn btn-outline-secondary w-25" onclick="calculate('max')">MAX</button>
                <span class="px-3">=</span>
                <span class="border p-2 d-inline-block text-warning" style="min-width: 60px;" id="resMax"></span>
            </div>

            <div class="d-flex align-items-center justify-content-center mb-3">
                <button class="btn btn-outline-secondary w-25" onclick="calculate('avg')">Average</button>
                <span class="px-3">=</span>
                <span class="border p-2 d-inline-block text-warning" style="min-width: 60px;" id="resAvg"></span>
            </div>

        </div>
    </div>
</div>

<script>
    function calculate(type) {
        const n1 = parseFloat(document.getElementById('num1').value) || 0;
        const n2 = parseFloat(document.getElementById('num2').value) || 0;
        const n3 = parseFloat(document.getElementById('num3').value) || 0;


        if (type === 'add') {
            document.getElementById('resAdd').innerText = n1 + n2 + n3;
        } else if (type === 'multi') {
            document.getElementById('resMulti').innerText = n1 * n2 * n3;
        } else if (type === 'max') {
            document.getElementById('resMax').innerText = Math.max(n1, n2, n3);
        } else if (type === 'avg') {
            document.getElementById('resAvg').innerText = ((n1 + n2 + n3) / 3).toFixed(2);
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

</body>
</html>
